# Closest match to the official JAX svBRDF training defaults, within the
# constraints of this PyTorch reimplementation.
#
# Official settings that are approximated here:
# - 60,000 total iterations
# - 20,000 init iterations
# - lr = 5e-4
# - 256x256 exemplar frames with 128x128 random training crops
# - 256x256 sampling size
# - roughly 500-step evaluation / checkpoint cadence
#
# Official behaviors that are now represented in config, but not yet fully
# implemented end-to-end in runtime semantics:
# - reduce-on-plateau LR schedule driven by eval-time inference loss
# - multi-crop / shuffle loss estimation per iteration

experiment:
  name: full_clay_solidifying_official_like
  output_root: outputs
  seed: 42

data:
  root: data_local/svbrdf_full
  exemplar: clay_solidifying
  image_size: 256
  crop_size: 128
  n_frames: 100
  t_S: 0.0
  t_E: 10.0

model:
  dim: 64
  solver: heun

rendering:
  renderer_type: diffuse_cook_torrance
  n_normal_channels: 1
  n_aug_channels: 9
  camera_fov: 50.0
  camera_distance: 1.0
  light_intensity: 0.0
  light_xy_position: [0.0, 0.0]
  height_scale: 1.0
  gamma: 2.2

train:
  runtime:
    batch_size: 1
    lr: 0.0005
    dry_run: false
    n_iter: 60000
    log_every: 1
    checkpoint_every: 500
    resume_from: null
  stage:
    n_init_iter: 20000
    refresh_rate_init: 2
    refresh_rate_local: 6
  loss:
    loss_type: SW
    n_loss_crops: 32
    overflow_weight: 100.0
    init_height_weight: 1.0
  scheduler:
    eval_every: 500
    scheduler_factor: 0.5
    scheduler_patience_evals: 5
    scheduler_min_lr: 0.0001
